<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #FF6B35;
  --accent-light: #2a1a12;
  --accent-mid: #3d2010;
  --bg: #0f0f0f;
  --surface: #161616;
  --surface2: #1a1a1a;
  --border: #252525;
  --border2: #2e2e2e;
  --text: #f0ede8;
  --muted: #777;
  --dim: #555;
  --green: #52b788;
  --green-bg: #1a3328;
  --green-border: #2d6a4f;
  --red: #e63946;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.brand { font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: 0.01em; }
.brand-sep { color: var(--dim); font-size: 13px; margin-left: 2px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.progress-wrap { display: flex; align-items: center; gap: 9px; }
.progress-track { width: 130px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
.progress-label { font-size: 12px; color: var(--muted); font-weight: 500; min-width: 80px; }

/* ── LAYOUT ── */
#shell { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar {
  width: 230px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 20px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.15s;
  position: relative;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--accent-light); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-label { font-size: 13.5px; font-weight: 500; color: var(--text); }
.nav-item.active .nav-label { color: var(--accent); }
.nav-badge {
  margin-left: auto;
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid var(--green-border);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
}
.nav-badge.pending { background: var(--surface2); color: var(--muted); border-color: var(--border2); }

/* ── MAIN CONTENT ── */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  background: var(--bg);
}
#main::-webkit-scrollbar { width: 6px; }
#main::-webkit-scrollbar-track { background: var(--bg); }
#main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.section-header { margin-bottom: 28px; }
.section-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); margin-bottom: 6px; }
.section-sub { font-size: 14px; color: var(--muted); }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 16px;
}

/* ── FORM ELEMENTS ── */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.field-row.single { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field select, .field textarea {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  transition: border-color 0.15s;
  outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
}
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.field select option { background: var(--surface2); }

/* ── TOGGLE ROW ── */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 14px; color: var(--text); }
.toggle-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--border2);
  border-radius: 22px;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ── DAY PILLS ── */
.day-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.day-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  transition: all 0.15s;
  user-select: none;
}
.day-pill.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* ── TABS ── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; overflow-x: auto; }
.tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── MESSAGE BOX ── */
.msg-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}
.msg-box-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.msg-box-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.char-count { font-size: 11px; color: var(--dim); }
.msg-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  outline: none;
  min-height: 70px;
}

/* ── FAQ ── */
.faq-item {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.faq-num { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.faq-item input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 4px 0 8px;
  outline: none;
  margin-bottom: 8px;
}
.faq-item input:focus { border-bottom-color: var(--accent); }
.faq-item textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: inherit;
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 50px;
  line-height: 1.5;
}

/* ── INTEGRATION CARDS ── */
.int-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 16px;
}
.int-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.int-icon { font-size: 24px; }
.int-title { font-size: 15px; font-weight: 600; color: var(--text); }
.int-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
.pw-wrap { position: relative; }
.pw-wrap input { width: 100%; padding-right: 38px; }
.pw-toggle {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px;
}
.pw-toggle:hover { color: var(--text); }

/* ── REVIEW ── */
#review-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto;
  padding: 40px;
}
#review-screen::-webkit-scrollbar { width: 6px; }
#review-screen::-webkit-scrollbar-track { background: var(--bg); }
#review-screen::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.review-header {
  text-align: center;
  margin-bottom: 40px;
}
.review-check {
  width: 52px; height: 52px;
  background: var(--green-bg);
  border: 2px solid var(--green-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: var(--green);
  margin: 0 auto 16px;
}
.review-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 8px; }
.review-sub { font-size: 14px; color: var(--muted); }
.review-sections { max-width: 720px; margin: 0 auto; }
.review-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.review-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.review-group-header:hover { background: var(--surface2); }
.review-group-title { font-size: 14px; font-weight: 600; color: var(--text); }
.review-group-toggle { color: var(--muted); font-size: 12px; }
.review-group-body { padding: 0 20px 16px; border-top: 1px solid var(--border); display: none; }
.review-group-body.open { display: block; }
.review-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.review-row:last-child { border-bottom: none; }
.review-key { color: var(--muted); min-width: 180px; flex-shrink: 0; }
.review-val { color: var(--text); word-break: break-word; }
.review-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
  padding-bottom: 40px;
}

/* ── BUTTONS ── */
.btn {
  padding: 10px 22px;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

.nav-footer {
  margin-top: auto;
  padding: 16px 20px 0;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.section-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-left">
    <div class="brand-dot"></div>
    <span class="brand">Leadly</span>
    <span class="brand-sep">/ Client Onboarding</span>
  </div>
  <div class="topbar-right">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-label" id="prog-label">0% complete</span>
    </div>
    <button class="btn btn-primary" onclick="showReview()">Review & Finish</button>
  </div>
</div>

<div id="shell">
  <nav id="sidebar">
    <div class="nav-item active" onclick="nav(0)" id="nav-0">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Calendar Setup</span>
      <span class="nav-badge pending" id="badge-0">—</span>
    </div>
    <div class="nav-item" onclick="nav(1)" id="nav-1">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Automations</span>
      <span class="nav-badge pending" id="badge-1">—</span>
    </div>
    <div class="nav-item" onclick="nav(2)" id="nav-2">
      <span class="nav-icon">🔗</span>
      <span class="nav-label">Integrations</span>
      <span class="nav-badge pending" id="badge-2">—</span>
    </div>
    <div class="nav-footer">
      <button class="btn btn-ghost" style="flex:1;font-size:13px" onclick="showReview()">Review All</button>
    </div>
  </nav>
  <main id="main"></main>
</div>

<div id="review-screen"></div>

<script>
const S = {
  cal: {
    calName:'', calTimezone:'', slotDuration:'30', slotInterval:'30',
    bufferBefore:'0', bufferAfter:'0', bookingWindow:'30', minNotice:'60',
    confirmType:'auto', meetingType:'phone', meetingLocation:'',
    allowReschedule:true, allowCancel:true, requirePayment:false,
    days:{ mon:true, tue:true, wed:true, thu:true, fri:true, sat:false, sun:false },
    startTime:'09:00', endTime:'17:00'
  },
  messages: {
    organicComment:['','',''],
    organicDM:['','',''],
    whatsapp:['','',''],
    bookedAppt:{ confirmation:'', reminder24:'', reminder1:'', followUp:'', noShow:'' },
    followUp:['','','','',''],
    faqBot:Array.from({length:30},()=>({q:'',a:''}))
  },
  int: {
    tiktok:{ clientKey:'', clientSecret:'', accessToken:'' },
    meta:{ appId:'', appSecret:'', pageToken:'', wabaId:'' },
    whatsapp:{ phoneNumberId:'', apiToken:'', webhookSecret:'' }
  }
};

let currentSection = 0;
let autoTab = 0;

function nav(i) {
  currentSection = i;
  document.querySelectorAll('.nav-item').forEach((el,idx) => el.classList.toggle('active', idx===i));
  render();
}

function render() {
  const m = document.getElementById('main');
  if (currentSection===0) m.innerHTML = renderCalendar();
  else if (currentSection===1) m.innerHTML = renderAutomations();
  else m.innerHTML = renderIntegrations();
  updateProgress();
  bindEvents();
}

function bindEvents() {
  // Calendar fields
  document.querySelectorAll('[data-cal]').forEach(el => {
    el.addEventListener('change', e => { S.cal[e.target.dataset.cal] = e.target.type==='checkbox'?e.target.checked:e.target.value; updateProgress(); });
    el.addEventListener('input', e => { S.cal[e.target.dataset.cal] = e.target.value; updateProgress(); });
  });
  // Day pills
  document.querySelectorAll('.day-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const d = pill.dataset.day;
      S.cal.days[d] = !S.cal.days[d];
      pill.classList.toggle('on', S.cal.days[d]);
    });
  });
  // Toggle switches
  document.querySelectorAll('[data-cal-toggle]').forEach(el => {
    el.addEventListener('change', e => { S.cal[e.target.dataset.calToggle] = e.target.checked; });
  });
  // Message textareas
  document.querySelectorAll('[data-msg]').forEach(el => {
    el.addEventListener('input', e => {
      const [section, idx] = e.target.dataset.msg.split(':');
      if (idx !== undefined) S.messages[section][parseInt(idx)] = e.target.value;
      else S.messages.bookedAppt[section] = e.target.value;
      updateCharCount(e.target);
      updateProgress();
    });
  });
  // FAQ fields
  document.querySelectorAll('[data-faq-q]').forEach(el => {
    el.addEventListener('input', e => { S.messages.faqBot[parseInt(e.target.dataset.faqQ)].q = e.target.value; updateProgress(); });
  });
  document.querySelectorAll('[data-faq-a]').forEach(el => {
    el.addEventListener('input', e => { S.messages.faqBot[parseInt(e.target.dataset.faqA)].a = e.target.value; updateProgress(); });
  });
  // Integration fields
  document.querySelectorAll('[data-int]').forEach(el => {
    el.addEventListener('input', e => {
      const [platform, field] = e.target.dataset.int.split(':');
      S.int[platform][field] = e.target.value;
      updateProgress();
    });
  });
}

function updateCharCount(el) {
  const id = el.id;
  if (!id) return;
  const cc = document.getElementById('cc-'+id);
  if (cc) cc.textContent = el.value.length + ' chars';
}

function updateProgress() {
  let filled = 0, total = 0;
  // Cal
  const calFields = ['calName','calTimezone','slotDuration','slotInterval','startTime','endTime'];
  calFields.forEach(f => { total++; if(S.cal[f]) filled++; });
  // Messages - count non-empty arrays
  ['organicComment','organicDM','whatsapp','followUp'].forEach(k => {
    S.messages[k].forEach(v => { total++; if(v.trim()) filled++; });
  });
  Object.values(S.messages.bookedAppt).forEach(v => { total++; if(v.trim()) filled++; });
  // Integrations
  Object.values(S.int).forEach(obj => Object.values(obj).forEach(v => { total++; if(v.trim()) filled++; }));

  const pct = Math.round((filled/total)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = pct+'% complete';

  // Badges
  const calDone = calFields.filter(f=>S.cal[f]).length;
  const b0 = document.getElementById('badge-0');
  if (b0) { b0.textContent = calDone===calFields.length ? 'Done' : calDone+'/'+calFields.length; b0.className = 'nav-badge'+(calDone===calFields.length?'':' pending'); }

  const msgFilled = [...S.messages.organicComment,...S.messages.organicDM,...S.messages.whatsapp,...S.messages.followUp,
    ...Object.values(S.messages.bookedAppt)].filter(v=>v.trim()).length;
  const msgTotal = S.messages.organicComment.length+S.messages.organicDM.length+S.messages.whatsapp.length+
    S.messages.followUp.length+Object.keys(S.messages.bookedAppt).length;
  const b1 = document.getElementById('badge-1');
  if (b1) { b1.textContent = msgFilled===msgTotal?'Done':msgFilled+'/'+msgTotal; b1.className='nav-badge'+(msgFilled===msgTotal?'':' pending'); }

  const intFilled = Object.values(S.int).flatMap(o=>Object.values(o)).filter(v=>v.trim()).length;
  const intTotal = Object.values(S.int).flatMap(o=>Object.values(o)).length;
  const b2 = document.getElementById('badge-2');
  if (b2) { b2.textContent = intFilled===intTotal?'Done':intFilled+'/'+intTotal; b2.className='nav-badge'+(intFilled===intTotal?'':' pending'); }
}

function renderCalendar() {
  const c = S.cal;
  const dayList = [{k:'mon',l:'Mon'},{k:'tue',l:'Tue'},{k:'wed',l:'Wed'},{k:'thu',l:'Thu'},{k:'fri',l:'Fri'},{k:'sat',l:'Sat'},{k:'sun',l:'Sun'}];
  return `
  <div class="section-header">
    <div class="section-title">Calendar Setup</div>
    <div class="section-sub">Configure your booking calendar settings and availability.</div>
  </div>
  <div class="card">
    <div class="card-title">Basic Info</div>
    <div class="field-row">
      <div class="field"><label>Calendar Name</label><input type="text" data-cal="calName" value="${c.calName}" placeholder="e.g. Discovery Call"></div>
      <div class="field"><label>Timezone</label>
        <select data-cal="calTimezone">
          <option value="">Select timezone…</option>
          ${['UTC','America/New_York','America/Chicago','America/Denver','America/Los_Angeles','America/Toronto','Europe/London','Europe/Paris','Asia/Singapore','Asia/Tokyo','Australia/Sydney'].map(tz=>`<option value="${tz}" ${c.calTimezone===tz?'selected':''}>${tz}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Meeting Type</label>
        <select data-cal="meetingType">
          <option value="phone" ${c.meetingType==='phone'?'selected':''}>Phone Call</option>
          <option value="video" ${c.meetingType==='video'?'selected':''}>Video Call</option>
          <option value="in_person" ${c.meetingType==='in_person'?'selected':''}>In Person</option>
        </select>
      </div>
      <div class="field"><label>Meeting Location / Link</label><input type="text" data-cal="meetingLocation" value="${c.meetingLocation}" placeholder="Zoom link or address"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Scheduling</div>
    <div class="field-row three">
      <div class="field"><label>Slot Duration (min)</label>
        <select data-cal="slotDuration">
          ${[15,20,30,45,60,90,120].map(v=>`<option value="${v}" ${c.slotDuration==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Slot Interval (min)</label>
        <select data-cal="slotInterval">
          ${[10,15,20,30,45,60].map(v=>`<option value="${v}" ${c.slotInterval==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Booking Window (days)</label>
        <select data-cal="bookingWindow">
          ${[7,14,21,30,45,60,90].map(v=>`<option value="${v}" ${c.bookingWindow==v?'selected':''}>${v} days</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row three">
      <div class="field"><label>Buffer Before (min)</label>
        <select data-cal="bufferBefore">
          ${[0,5,10,15,20,30].map(v=>`<option value="${v}" ${c.bufferBefore==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Buffer After (min)</label>
        <select data-cal="bufferAfter">
          ${[0,5,10,15,20,30].map(v=>`<option value="${v}" ${c.bufferAfter==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Min Notice (min)</label>
        <select data-cal="minNotice">
          ${[0,30,60,120,240,480,1440].map(v=>`<option value="${v}" ${c.minNotice==v?'selected':''}>${v<60?v+' min':v/60+'h'}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Start Time</label><input type="time" data-cal="startTime" value="${c.startTime}"></div>
      <div class="field"><label>End Time</label><input type="time" data-cal="endTime" value="${c.endTime}"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Availability Days</div>
    <div class="day-pills">
      ${dayList.map(d=>`<div class="day-pill ${c.days[d.k]?'on':''}" data-day="${d.k}">${d.l}</div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">Confirmation & Options</div>
    <div class="field-row">
      <div class="field"><label>Confirmation Type</label>
        <select data-cal="confirmType">
          <option value="auto" ${c.confirmType==='auto'?'selected':''}>Auto Confirm</option>
          <option value="manual" ${c.confirmType==='manual'?'selected':''}>Manual Confirm</option>
        </select>
      </div>
    </div>
    <div class="toggle-row">
      <div><div class="toggle-label">Allow Reschedule</div><div class="toggle-sub">Clients can reschedule their booking</div></div>
      <label class="toggle"><input type="checkbox" data-cal-toggle="allowReschedule" ${c.allowReschedule?'checked':''}><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <div><div class="toggle-label">Allow Cancellation</div><div class="toggle-sub">Clients can cancel their booking</div></div>
      <label class="toggle"><input type="checkbox" data-cal-toggle="allowCancel" ${c.allowCancel?'checked':''}><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <div><div class="toggle-label">Require Payment</div><div class="toggle-sub">Collect payment before confirming</div></div>
      <label class="toggle"><input type="checkbox" data-cal-toggle="requirePayment" ${c.requirePayment?'checked':''}><span class="toggle-slider"></span></label>
    </div>
  </div>
  <div class="section-footer">
    <button class="btn btn-primary" onclick="nav(1)">Next: Automations →</button>
  </div>`;
}

function renderAutomations() {
  const tabs = ['Organic Comments','Organic DMs','WhatsApp Replies','Booked Appt Flow','Follow-Up Seq','FAQ Bot'];
  const content = [renderOrganic('organicComment','Organic Comment Reply','Reply sent when someone comments on your posts'),renderOrganic('organicDM','Organic DM Reply','First reply sent to cold DMs'),renderOrganic('whatsapp','WhatsApp Reply','Auto-reply messages for WhatsApp'),renderBookedAppt(),renderFollowUp(),renderFAQ()];
  return `
  <div class="section-header">
    <div class="section-title">Automation Messages</div>
    <div class="section-sub">Configure all automated replies and message sequences.</div>
  </div>
  <div class="tabs">${tabs.map((t,i)=>`<div class="tab ${autoTab===i?'active':''}" onclick="autoTab=${i};render()">${t}</div>`).join('')}</div>
  ${content[autoTab]}
  <div class="section-footer">
    <button class="btn btn-secondary" onclick="nav(0)">← Calendar</button>
    <button class="btn btn-primary" onclick="nav(2)">Next: Integrations →</button>
  </div>`;
}

function renderOrganic(key, title, desc) {
  return `<div class="card"><div class="card-title">${title}</div><p style="font-size:13px;color:var(--muted);margin-bottom:14px">${desc}</p>
  ${S.messages[key].map((v,i)=>`
  <div class="msg-box">
    <div class="msg-box-header"><span class="msg-box-label">Variant ${i+1}</span><span class="char-count" id="cc-msg-${key}-${i}">${v.length} chars</span></div>
    <textarea id="msg-${key}-${i}" data-msg="${key}:${i}" placeholder="Enter message variant ${i+1}…">${v}</textarea>
  </div>`).join('')}
  </div>`;
}

function renderBookedAppt() {
  const b = S.messages.bookedAppt;
  const fields = [
    {k:'confirmation',l:'Booking Confirmation',p:'Sent immediately after booking is confirmed…'},
    {k:'reminder24',l:'24-Hour Reminder',p:'Sent 24 hours before the appointment…'},
    {k:'reminder1',l:'1-Hour Reminder',p:'Sent 1 hour before the appointment…'},
    {k:'followUp',l:'Post-Appointment Follow-Up',p:'Sent after the appointment ends…'},
    {k:'noShow',l:'No-Show Message',p:'Sent if the client misses the appointment…'}
  ];
  return `<div class="card"><div class="card-title">Booked Appointment Flow</div>
  ${fields.map(f=>`
  <div class="msg-box">
    <div class="msg-box-header"><span class="msg-box-label">${f.l}</span><span class="char-count" id="cc-msg-ba-${f.k}">${(b[f.k]||'').length} chars</span></div>
    <textarea id="msg-ba-${f.k}" data-msg="${f.k}" placeholder="${f.p}">${b[f.k]||''}</textarea>
  </div>`).join('')}
  </div>`;
}

function renderFollowUp() {
  return `<div class="card"><div class="card-title">Follow-Up Sequence</div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Messages sent in sequence for leads who haven't converted.</p>
  ${S.messages.followUp.map((v,i)=>`
  <div class="msg-box">
    <div class="msg-box-header"><span class="msg-box-label">Day ${[1,3,7,14,30][i]} Follow-Up</span><span class="char-count" id="cc-msg-fu-${i}">${v.length} chars</span></div>
    <textarea id="msg-fu-${i}" data-msg="followUp:${i}" placeholder="Day ${[1,3,7,14,30][i]} follow-up message…">${v}</textarea>
  </div>`).join('')}
  </div>`;
}

function renderFAQ() {
  return `<div class="card"><div class="card-title">FAQ Bot (30 Q&A Pairs)</div>
  <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Questions your bot will automatically answer.</p>
  ${S.messages.faqBot.map((pair,i)=>`
  <div class="faq-item">
    <div class="faq-num">Q${i+1}</div>
    <input type="text" data-faq-q="${i}" value="${pair.q}" placeholder="Question…">
    <textarea data-faq-a="${i}" placeholder="Answer…">${pair.a}</textarea>
  </div>`).join('')}
  </div>`;
}

function renderIntegrations() {
  return `
  <div class="section-header">
    <div class="section-title">Integrations</div>
    <div class="section-sub">Enter your API credentials for each platform.</div>
  </div>
  <div class="int-card">
    <div class="int-card-header">
      <span class="int-icon">🎵</span>
      <div><div class="int-title">TikTok</div><div class="int-desc">TikTok for Business API credentials</div></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Client Key</label><input type="text" data-int="tiktok:clientKey" value="${S.int.tiktok.clientKey}" placeholder="TikTok client key"></div>
      <div class="field"><label>Client Secret</label>
        <div class="pw-wrap">
          <input type="password" id="tt-secret" data-int="tiktok:clientSecret" value="${S.int.tiktok.clientSecret}" placeholder="TikTok client secret">
          <button class="pw-toggle" onclick="togglePw('tt-secret')">👁</button>
        </div>
      </div>
    </div>
    <div class="field-row single">
      <div class="field"><label>Access Token</label>
        <div class="pw-wrap">
          <input type="password" id="tt-token" data-int="tiktok:accessToken" value="${S.int.tiktok.accessToken}" placeholder="TikTok access token">
          <button class="pw-toggle" onclick="togglePw('tt-token')">👁</button>
        </div>
      </div>
    </div>
  </div>
  <div class="int-card">
    <div class="int-card-header">
      <span class="int-icon">📘</span>
      <div><div class="int-title">Meta (Facebook / Instagram)</div><div class="int-desc">Meta Business API credentials</div></div>
    </div>
    <div class="field-row">
      <div class="field"><label>App ID</label><input type="text" data-int="meta:appId" value="${S.int.meta.appId}" placeholder="Meta App ID"></div>
      <div class="field"><label>App Secret</label>
        <div class="pw-wrap">
          <input type="password" id="meta-secret" data-int="meta:appSecret" value="${S.int.meta.appSecret}" placeholder="Meta App Secret">
          <button class="pw-toggle" onclick="togglePw('meta-secret')">👁</button>
        </div>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Page Access Token</label>
        <div class="pw-wrap">
          <input type="password" id="meta-token" data-int="meta:pageToken" value="${S.int.meta.pageToken}" placeholder="Page access token">
          <button class="pw-toggle" onclick="togglePw('meta-token')">👁</button>
        </div>
      </div>
      <div class="field"><label>WABA ID</label><input type="text" data-int="meta:wabaId" value="${S.int.meta.wabaId}" placeholder="WhatsApp Business Account ID"></div>
    </div>
  </div>
  <div class="int-card">
    <div class="int-card-header">
      <span class="int-icon">💚</span>
      <div><div class="int-title">WhatsApp API</div><div class="int-desc">WhatsApp Cloud API credentials</div></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Phone Number ID</label><input type="text" data-int="whatsapp:phoneNumberId" value="${S.int.whatsapp.phoneNumberId}" placeholder="Phone Number ID"></div>
      <div class="field"><label>API Token</label>
        <div class="pw-wrap">
          <input type="password" id="wa-token" data-int="whatsapp:apiToken" value="${S.int.whatsapp.apiToken}" placeholder="WhatsApp API token">
          <button class="pw-toggle" onclick="togglePw('wa-token')">👁</button>
        </div>
      </div>
    </div>
    <div class="field-row single">
      <div class="field"><label>Webhook Secret</label>
        <div class="pw-wrap">
          <input type="password" id="wa-webhook" data-int="whatsapp:webhookSecret" value="${S.int.whatsapp.webhookSecret}" placeholder="Webhook verification secret">
          <button class="pw-toggle" onclick="togglePw('wa-webhook')">👁</button>
        </div>
      </div>
    </div>
  </div>
  <div class="section-footer">
    <button class="btn btn-secondary" onclick="nav(1)">← Automations</button>
    <button class="btn btn-primary" onclick="showReview()">Review & Finish →</button>
  </div>`;
}

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}function showReview() {
  const r = document.getElementById('review-screen');
  r.style.display = 'block';
  r.innerHTML = buildReview();
}

function buildReview() {
  const c = S.cal;
  const dayNames = {mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
  const activeDays = Object.entries(c.days).filter(([,v])=>v).map(([k])=>dayNames[k]).join(', ') || 'None';

  function group(title, rows) {
    const id = 'rg-'+Math.random().toString(36).slice(2);
    return `<div class="review-group">
      <div class="review-group-header" onclick="toggleGroup('${id}')">
        <span class="review-group-title">${title}</span>
        <span class="review-group-toggle" id="${id}-tog">Show ▾</span>
      </div>
      <div class="review-group-body" id="${id}">
        ${rows.map(([k,v])=>`<div class="review-row"><span class="review-key">${k}</span><span class="review-val">${v||'<em style="color:var(--dim)">Not filled</em>'}</span></div>`).join('')}
      </div>
    </div>`;
  }

  const calRows = [
    ['Calendar Name', c.calName],
    ['Timezone', c.calTimezone],
    ['Meeting Type', c.meetingType],
    ['Meeting Location', c.meetingLocation],
    ['Slot Duration', c.slotDuration+' min'],
    ['Slot Interval', c.slotInterval+' min'],
    ['Buffer Before', c.bufferBefore+' min'],
    ['Buffer After', c.bufferAfter+' min'],
    ['Booking Window', c.bookingWindow+' days'],
    ['Min Notice', c.minNotice+' min'],
    ['Hours', c.startTime+' – '+c.endTime],
    ['Active Days', activeDays],
    ['Confirmation', c.confirmType],
    ['Allow Reschedule', c.allowReschedule?'Yes':'No'],
    ['Allow Cancel', c.allowCancel?'Yes':'No'],
    ['Require Payment', c.requirePayment?'Yes':'No'],
  ];

  const msgRows = [
    ...S.messages.organicComment.map((v,i)=>['Organic Comment V'+(i+1), v]),
    ...S.messages.organicDM.map((v,i)=>['Organic DM V'+(i+1), v]),
    ...S.messages.whatsapp.map((v,i)=>['WhatsApp V'+(i+1), v]),
    ['Booking Confirmation', S.messages.bookedAppt.confirmation],
    ['24h Reminder', S.messages.bookedAppt.reminder24],
    ['1h Reminder', S.messages.bookedAppt.reminder1],
    ['Post-Appt Follow-Up', S.messages.bookedAppt.followUp],
    ['No-Show', S.messages.bookedAppt.noShow],
    ...S.messages.followUp.map((v,i)=>['Follow-Up Day '+[1,3,7,14,30][i], v]),
  ];

  const faqRows = S.messages.faqBot.filter(p=>p.q||p.a).map((p,i)=>['Q'+(i+1)+': '+p.q, p.a]);

  const intRows = [
    ['TikTok Client Key', S.int.tiktok.clientKey],
    ['TikTok Client Secret', S.int.tiktok.clientSecret ? '••••••••' : ''],
    ['TikTok Access Token', S.int.tiktok.accessToken ? '••••••••' : ''],
    ['Meta App ID', S.int.meta.appId],
    ['Meta App Secret', S.int.meta.appSecret ? '••••••••' : ''],
    ['Meta Page Token', S.int.meta.pageToken ? '••••••••' : ''],
    ['Meta WABA ID', S.int.meta.wabaId],
    ['WA Phone Number ID', S.int.whatsapp.phoneNumberId],
    ['WA API Token', S.int.whatsapp.apiToken ? '••••••••' : ''],
    ['WA Webhook Secret', S.int.whatsapp.webhookSecret ? '••••••••' : ''],
  ];

  return `
    <div class="review-header">
      <div class="review-check">✓</div>
      <h1 class="review-title">Onboarding Summary</h1>
      <p class="review-sub">Review everything below before your setup session.</p>
    </div>
    <div class="review-sections">
      ${group('📅 Calendar Setup', calRows)}
      ${group('💬 Automation Messages', msgRows)}
      ${faqRows.length ? group('🤖 FAQ Bot', faqRows) : ''}
      ${group('🔗 Integrations', intRows)}
    </div>
    <div class="review-actions">
      <button class="btn btn-ghost" onclick="closeReview()">← Back to Edit</button>
      <button class="btn btn-secondary" onclick="copyJSON()">Copy JSON</button>
      <button class="btn btn-primary" onclick="submitAll()">Submit Onboarding ✓</button>
    </div>`;
}

function toggleGroup(id) {
  const body = document.getElementById(id);
  const tog = document.getElementById(id+'-tog');
  const open = body.classList.toggle('open');
  tog.textContent = open ? 'Hide ▴' : 'Show ▾';
}

function closeReview() {
  document.getElementById('review-screen').style.display = 'none';
}

function copyJSON() {
  const data = JSON.stringify(S, null, 2);
  navigator.clipboard.writeText(data).then(()=>{
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(()=>btn.textContent='Copy JSON', 2000);
  });
}

function submitAll() {
  alert('Onboarding complete! Your data has been collected.');
}

// Init
render();
updateProgress();
</script>
</body>
</html>
