<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #FF6B35;
  --accent-light: #2a1a12;
  --accent-mid: #3d2010;
  --bg: #0f0f0f;
  --surface: #161616;
  --surface2: #1a1a1a;
  --surface3: #202020;
  --border: #252525;
  --border2: #2e2e2e;
  --text: #f0ede8;
  --muted: #777;
  --dim: #555;
  --green: #52b788;
  --green-bg: #1a3328;
  --green-border: #2d6a4f;
  --red: #e63946;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.brand { font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: 0.01em; }
.brand-sep { color: var(--dim); font-size: 13px; margin-left: 2px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.progress-wrap { display: flex; align-items: center; gap: 9px; }
.progress-track { width: 130px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
.progress-label { font-size: 12px; color: var(--muted); font-weight: 500; min-width: 80px; }

#shell { display: flex; flex: 1; overflow: hidden; }

#sidebar {
  width: 250px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--accent-light); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-label { font-size: 13.5px; font-weight: 500; color: var(--text); }
.nav-item.active .nav-label { color: var(--accent); }
.nav-badge {
  margin-left: auto;
  background: var(--green-bg);
  color: var(--green);
  border: 1px solid var(--green-border);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
}
.nav-badge.pending { background: var(--surface2); color: var(--muted); border-color: var(--border2); }

#main {
  flex: 1;
  overflow-y: auto;
  padding: 36px 44px;
  background: var(--bg);
}
#main::-webkit-scrollbar { width: 6px; }
#main::-webkit-scrollbar-track { background: var(--bg); }
#main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.section-header { margin-bottom: 28px; }
.section-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); margin-bottom: 6px; }
.section-sub { font-size: 14px; color: var(--muted); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 24px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 16px;
}

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.field-row.single { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.field input, .field select, .field textarea {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  transition: border-color 0.15s;
  outline: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.field select option { background: var(--surface2); }
.helper { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 4px; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-label { font-size: 14px; color: var(--text); }
.toggle-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--border2);
  border-radius: 22px;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

.day-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.day-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  transition: all 0.15s;
  user-select: none;
}
.day-pill.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; overflow-x: auto; }
.tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.msg-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}
.msg-box-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.msg-box-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.char-count { font-size: 11px; color: var(--dim); }
.msg-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  resize: none;
  outline: none;
  min-height: 84px;
}

.faq-item {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.faq-num { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.faq-item input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 4px 0 8px;
  outline: none;
  margin-bottom: 8px;
}
.faq-item input:focus { border-bottom-color: var(--accent); }
.faq-item textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: inherit;
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 50px;
  line-height: 1.5;
}

.mini-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.mini-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px;
}
.mini-card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
}

.review-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  overflow-y: auto;
  padding: 40px;
}
.review-header {
  text-align: center;
  margin-bottom: 40px;
}
.review-check {
  width: 52px; height: 52px;
  background: var(--green-bg);
  border: 2px solid var(--green-border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: var(--green);
  margin: 0 auto 16px;
}
.review-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 8px; }
.review-sub { font-size: 14px; color: var(--muted); }
.review-sections { max-width: 800px; margin: 0 auto; }
.review-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}
.review-group-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
}
.review-group-header:hover { background: var(--surface2); }
.review-group-title { font-size: 14px; font-weight: 600; color: var(--text); }
.review-group-toggle { color: var(--muted); font-size: 12px; }
.review-group-body { padding: 0 20px 16px; border-top: 1px solid var(--border); display: none; }
.review-group-body.open { display: block; }
.review-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.review-row:last-child { border-bottom: none; }
.review-key { color: var(--muted); min-width: 210px; flex-shrink: 0; }
.review-val { color: var(--text); word-break: break-word; }
.review-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
  padding-bottom: 40px;
}

.btn {
  padding: 10px 22px;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: white; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

.nav-footer {
  margin-top: auto;
  padding: 16px 20px 0;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.section-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

@media (max-width: 1100px) {
  #sidebar { width: 220px; }
  .field-row.three, .mini-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 840px) {
  #shell { flex-direction: column; }
  #sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }
  #main { padding: 24px 20px; }
  .field-row, .field-row.three, .mini-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-left">
    <div class="brand-dot"></div>
    <span class="brand">Leadly</span>
    <span class="brand-sep">/ Client Onboarding</span>
  </div>
  <div class="topbar-right">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-label" id="prog-label">0% complete</span>
    </div>
    <button class="btn btn-primary" onclick="showReview()">Review & Finish</button>
  </div>
</div>

<div id="shell">
  <nav id="sidebar">
    <div class="nav-item active" onclick="nav(0)" id="nav-0">
      <span class="nav-icon">📅</span>
      <span class="nav-label">Calendar Setup</span>
      <span class="nav-badge pending" id="badge-0">—</span>
    </div>
    <div class="nav-item" onclick="nav(1)" id="nav-1">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Automation Messaging</span>
      <span class="nav-badge pending" id="badge-1">—</span>
    </div>
    <div class="nav-footer">
      <button class="btn btn-ghost" style="flex:1;font-size:13px" onclick="showReview()">Review All</button>
    </div>
  </nav>
  <main id="main"></main>
</div>

<div id="review-screen" class="review-screen"></div>

<script>
const S = {
  cal: {
    calName: '',
    description: '',
    calTimezone: 'Asia/Singapore',
    calendarOwner: '',
    eventTitle: '',
    meetingType: 'phone',
    meetingLocation: '',
    slotDuration: '30',
    slotInterval: '30',
    bookingWindow: '30',
    minNotice: '60',
    maxPerDay: '',
    maxPerSlotPerPerson: '1',
    bufferBefore: '0',
    bufferAfter: '0',
    leadSourceRouting: 'all_to_primary',
    confirmType: 'auto',
    confirmationPageMessage: '',
    cancellationPolicy: '',
    reschedulePolicy: '',
    preAppointmentInstructions: '',
    internalNotes: '',
    allowReschedule: true,
    allowCancel: true,
    requireApproval: false,
    requirePayment: false,
    collectName: true,
    collectEmail: true,
    collectPhone: true,
    collectReason: true,
    collectNotes: false,
    days: { mon:true, tue:true, wed:true, thu:true, fri:true, sat:false, sun:false },
    mondayStart: '09:00', mondayEnd: '17:00',
    tuesdayStart: '09:00', tuesdayEnd: '17:00',
    wednesdayStart: '09:00', wednesdayEnd: '17:00',
    thursdayStart: '09:00', thursdayEnd: '17:00',
    fridayStart: '09:00', fridayEnd: '17:00',
    saturdayStart: '09:00', saturdayEnd: '13:00',
    sundayStart: '09:00', sundayEnd: '13:00'
  },
  messages: {
    igComment:['','',''],
    fbComment:['','',''],
    ttComment:['','',''],
    igDM:['','',''],
    ttDM:['','',''],
    fbMessenger:['','',''],
    organicWhatsapp:['','',''],
    paidWhatsapp:['','',''],
    leadFormWhatsapp:['','',''],
    bookedAppt:{ immediate:'', dayBefore:'', reminder30:'' },
    followUp:['','','','','',''],
    faqBot:Array.from({length:30},()=>({q:'',a:''}))
  }
};

let currentSection = 0;
let autoTab = 0;

function nav(i) {
  currentSection = i;
  document.querySelectorAll('.nav-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
  render();
}

function render() {
  const m = document.getElementById('main');
  if (currentSection === 0) m.innerHTML = renderCalendar();
  else m.innerHTML = renderAutomations();
  updateProgress();
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('[data-cal]').forEach(el => {
    el.addEventListener('change', e => {
      S.cal[e.target.dataset.cal] = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
      updateProgress();
    });
    el.addEventListener('input', e => {
      S.cal[e.target.dataset.cal] = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
      updateProgress();
    });
  });

  document.querySelectorAll('.day-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const d = pill.dataset.day;
      S.cal.days[d] = !S.cal.days[d];
      pill.classList.toggle('on', S.cal.days[d]);
      updateProgress();
    });
  });

  document.querySelectorAll('[data-cal-toggle]').forEach(el => {
    el.addEventListener('change', e => {
      S.cal[e.target.dataset.calToggle] = e.target.checked;
      updateProgress();
    });
  });

  document.querySelectorAll('[data-msg]').forEach(el => {
    el.addEventListener('input', e => {
      const [section, idx] = e.target.dataset.msg.split(':');
      if (idx !== undefined) S.messages[section][parseInt(idx, 10)] = e.target.value;
      else S.messages.bookedAppt[section] = e.target.value;
      updateCharCount(e.target);
      updateProgress();
    });
  });

  document.querySelectorAll('[data-faq-q]').forEach(el => {
    el.addEventListener('input', e => {
      S.messages.faqBot[parseInt(e.target.dataset.faqQ, 10)].q = e.target.value;
      updateProgress();
    });
  });

  document.querySelectorAll('[data-faq-a]').forEach(el => {
    el.addEventListener('input', e => {
      S.messages.faqBot[parseInt(e.target.dataset.faqA, 10)].a = e.target.value;
      updateProgress();
    });
  });
}

function updateCharCount(el) {
  const id = el.id;
  if (!id) return;
  const cc = document.getElementById('cc-' + id);
  if (cc) cc.textContent = el.value.length + ' chars';
}

function updateProgress() {
  let filled = 0;
  let total = 0;

  const calFields = [
    'calName','description','calTimezone','calendarOwner','eventTitle','meetingType','slotDuration','slotInterval',
    'bookingWindow','minNotice','bufferBefore','bufferAfter','maxPerDay','maxPerSlotPerPerson',
    'confirmationPageMessage','mondayStart','mondayEnd','tuesdayStart','tuesdayEnd',
    'wednesdayStart','wednesdayEnd','thursdayStart','thursdayEnd','fridayStart','fridayEnd'
  ];

  calFields.forEach(f => {
    total++;
    if (String(S.cal[f] || '').trim()) filled++;
  });

  ['igComment','fbComment','ttComment','igDM','ttDM','fbMessenger','organicWhatsapp','paidWhatsapp','leadFormWhatsapp','followUp'].forEach(k => {
    S.messages[k].forEach(v => {
      total++;
      if (v.trim()) filled++;
    });
  });

  Object.values(S.messages.bookedAppt).forEach(v => {
    total++;
    if (v.trim()) filled++;
  });

  const pct = total ? Math.round((filled / total) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = pct + '% complete';

  const calDone = calFields.filter(f => String(S.cal[f] || '').trim()).length;
  const b0 = document.getElementById('badge-0');
  if (b0) {
    b0.textContent = calDone === calFields.length ? 'Done' : calDone + '/' + calFields.length;
    b0.className = 'nav-badge' + (calDone === calFields.length ? '' : ' pending');
  }

  const msgFilled = [
    ...S.messages.igComment,
    ...S.messages.fbComment,
    ...S.messages.ttComment,
    ...S.messages.igDM,
    ...S.messages.ttDM,
    ...S.messages.fbMessenger,
    ...S.messages.organicWhatsapp,
    ...S.messages.paidWhatsapp,
    ...S.messages.leadFormWhatsapp,
    ...S.messages.followUp,
    ...Object.values(S.messages.bookedAppt)
  ].filter(v => v.trim()).length;

  const msgTotal =
    S.messages.igComment.length +
    S.messages.fbComment.length +
    S.messages.ttComment.length +
    S.messages.igDM.length +
    S.messages.ttDM.length +
    S.messages.fbMessenger.length +
    S.messages.organicWhatsapp.length +
    S.messages.paidWhatsapp.length +
    S.messages.leadFormWhatsapp.length +
    S.messages.followUp.length +
    Object.keys(S.messages.bookedAppt).length;

  const b1 = document.getElementById('badge-1');
  if (b1) {
    b1.textContent = msgFilled === msgTotal ? 'Done' : msgFilled + '/' + msgTotal;
    b1.className = 'nav-badge' + (msgFilled === msgTotal ? '' : ' pending');
  }
}

function renderCalendar() {
  const c = S.cal;
  const dayList = [
    {k:'mon',l:'Mon'}, {k:'tue',l:'Tue'}, {k:'wed',l:'Wed'}, {k:'thu',l:'Thu'},
    {k:'fri',l:'Fri'}, {k:'sat',l:'Sat'}, {k:'sun',l:'Sun'}
  ];

  return `
  <div class="section-header">
    <div class="section-title">Calendar Setup</div>
    <div class="section-sub">Set up how leads book, what details are collected, and how appointment slots should run.</div>
  </div>

  <div class="card">
    <div class="card-title">Calendar Basics</div>
    <div class="field-row">
      <div class="field">
        <label>Calendar Name</label>
        <input type="text" data-cal="calName" value="${c.calName}" placeholder="e.g. Initial Consultation">
      </div>
      <div class="field">
        <label>Timezone</label>
        <select data-cal="calTimezone">
          ${['UTC','Asia/Singapore','Asia/Kuala_Lumpur','Asia/Jakarta','Australia/Sydney','Europe/London','America/Los_Angeles','America/New_York'].map(tz => `<option value="${tz}" ${c.calTimezone===tz?'selected':''}>${tz}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row single">
      <div class="field">
        <label>Description</label>
        <textarea data-cal="description" placeholder="Short description shown before booking.">${c.description}</textarea>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Calendar Owner</label>
        <input type="text" data-cal="calendarOwner" value="${c.calendarOwner}" placeholder="Main assigned team member">
      </div>
      <div class="field">
        <label>Booking Event Title</label>
        <input type="text" data-cal="eventTitle" value="${c.eventTitle}" placeholder="e.g. Discovery Call with Leadly">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Meeting Type</label>
        <select data-cal="meetingType">
          <option value="phone" ${c.meetingType==='phone'?'selected':''}>Phone Call</option>
          <option value="video" ${c.meetingType==='video'?'selected':''}>Video Call</option>
          <option value="in_person" ${c.meetingType==='in_person'?'selected':''}>In Person</option>
          <option value="whatsapp_call" ${c.meetingType==='whatsapp_call'?'selected':''}>WhatsApp Call</option>
        </select>
      </div>
      <div class="field">
        <label>Meeting Location / Link</label>
        <input type="text" data-cal="meetingLocation" value="${c.meetingLocation}" placeholder="Zoom link, clinic address, phone number, etc.">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Scheduling Rules</div>
    <div class="field-row three">
      <div class="field">
        <label>Meeting Interval</label>
        <select data-cal="slotInterval">
          ${[10,15,20,30,45,60].map(v => `<option value="${v}" ${c.slotInterval==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Meeting Duration</label>
        <select data-cal="slotDuration">
          ${[15,20,30,45,60,90,120].map(v => `<option value="${v}" ${c.slotDuration==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Min Scheduling Notice</label>
        <select data-cal="minNotice">
          ${[0,30,60,120,240,480,1440].map(v => `<option value="${v}" ${c.minNotice==v?'selected':''}>${v < 60 ? v + ' min' : (v/60) + 'h'}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row three">
      <div class="field">
        <label>Date Range</label>
        <select data-cal="bookingWindow">
          ${[7,14,21,30,45,60,90].map(v => `<option value="${v}" ${c.bookingWindow==v?'selected':''}>${v} days</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Pre Buffer Time</label>
        <select data-cal="bufferBefore">
          ${[0,5,10,15,20,30].map(v => `<option value="${v}" ${c.bufferBefore==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Post Buffer Time</label>
        <select data-cal="bufferAfter">
          ${[0,5,10,15,20,30].map(v => `<option value="${v}" ${c.bufferAfter==v?'selected':''}>${v} min</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row three">
      <div class="field">
        <label>Max Bookings Per Day</label>
        <input type="number" min="1" data-cal="maxPerDay" value="${c.maxPerDay}" placeholder="Optional cap">
      </div>
      <div class="field">
        <label>Max Booking Per Slot Per Person</label>
        <input type="number" min="1" data-cal="maxPerSlotPerPerson" value="${c.maxPerSlotPerPerson}" placeholder="e.g. 1">
      </div>
      <div class="field">
        <label>Confirmation Mode</label>
        <select data-cal="confirmType">
          <option value="auto" ${c.confirmType==='auto'?'selected':''}>Auto confirm</option>
          <option value="manual" ${c.confirmType==='manual'?'selected':''}>Manual approval required</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Availability Full Options</div>
    <div class="helper">Turn days on or off, then define the start and end time for each day.</div>
    <div class="day-pills">
      ${dayList.map(d => `<div class="day-pill ${c.days[d.k]?'on':''}" data-day="${d.k}">${d.l}</div>`).join('')}
    </div>

    <div style="margin-top:18px">
      ${[
        ['mon','Monday','mondayStart1','mondayEnd1','mondayStart2','mondayEnd2'],
        ['tue','Tuesday','tuesdayStart1','tuesdayEnd1','tuesdayStart2','tuesdayEnd2'],
        ['wed','Wednesday','wednesdayStart1','wednesdayEnd1','wednesdayStart2','wednesdayEnd2'],
        ['thu','Thursday','thursdayStart1','thursdayEnd1','thursdayStart2','thursdayEnd2'],
        ['fri','Friday','fridayStart1','fridayEnd1','fridayStart2','fridayEnd2'],
        ['sat','Saturday','saturdayStart1','saturdayEnd1','saturdayStart2','saturdayEnd2'],
        ['sun','Sunday','sundayStart1','sundayEnd1','sundayStart2','sundayEnd2']
      ].map(([key, label, startKey, endKey]) => `
        <div class="field-row" style="align-items:end; opacity:${c.days[key] ? 1 : 0.45}">
          <div class="field">
            <label>${label} Slot 1 Start</label>
            <input type="time" data-cal="${startKey}" value="${c[startKey]||''}">
          </div>
          <div class="field">
            <label>${label} Slot 1 End</label>
            <input type="time" data-cal="${endKey}" value="${c[endKey]||''}">
          </div>
          <div class="field">
            <label>${label} Slot 2 Start</label>
            <input type="time" data-cal="${arguments[4]}" value="${c[arguments[4]]||''}">
          </div>
          <div class="field">
            <label>${label} Slot 2 End</label>
            <input type="time" data-cal="${arguments[5]}" value="${c[arguments[5]]||''}">
          </div>
            <input type="time" data-cal="${endKey}" value="${c[endKey]}">
          </div>
        </div>
      `).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">Form Collection</div>
    <div class="mini-grid">
      <div class="mini-card">
        <div class="mini-card-title">Contact Details</div>
        <div class="toggle-row">
          <div><div class="toggle-label">Collect Full Name</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="collectName" ${c.collectName?'checked':''}><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Collect Email</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="collectEmail" ${c.collectEmail?'checked':''}><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Collect Phone</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="collectPhone" ${c.collectPhone?'checked':''}><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div class="mini-card">
        <div class="mini-card-title">Lead Qualification</div>
        <div class="toggle-row">
          <div><div class="toggle-label">Collect Reason for Enquiry</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="collectReason" ${c.collectReason?'checked':''}><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Collect Extra Notes</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="collectNotes" ${c.collectNotes?'checked':''}><span class="toggle-slider"></span></label>
        </div>
      </div>
      <div class="mini-card">
        <div class="mini-card-title">Booking Controls</div>
        <div class="toggle-row">
          <div><div class="toggle-label">Allow Reschedule</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="allowReschedule" ${c.allowReschedule?'checked':''}><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Allow Cancellation</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="allowCancel" ${c.allowCancel?'checked':''}><span class="toggle-slider"></span></label>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-label">Require Payment</div></div>
          <label class="toggle"><input type="checkbox" data-cal-toggle="requirePayment" ${c.requirePayment?'checked':''}><span class="toggle-slider"></span></label>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Confirmation & Policies</div>
    <div class="field-row single">
      <div class="field">
        <label>Confirmation Page Message</label>
        <textarea data-cal="confirmationPageMessage" placeholder="Message shown after the booking is successfully submitted.">${c.confirmationPageMessage}</textarea>
      </div>
    </div>
    <div class="field-row single">
      <div class="field">
        <label>Cancellation Policy</label>
        <textarea data-cal="cancellationPolicy" placeholder="e.g. Cancellations allowed up to 12 hours before appointment.">${c.cancellationPolicy}</textarea>
      </div>
    </div>
    <div class="field-row single">
      <div class="field">
        <label>Rescheduling Policy</label>
        <textarea data-cal="reschedulePolicy" placeholder="e.g. Rescheduling allowed up to 12 hours before appointment.">${c.reschedulePolicy}</textarea>
      </div>
    </div>
  </div>

  <div class="section-footer">
    <button class="btn btn-primary" onclick="nav(1)">Next: Automation Messaging →</button>
  </div>`;
}

function renderAutomations() {
  const tabs = [
    'IG Comment',
    'FB Comment',
    'TikTok Comment',
    'IG DM',
    'TikTok DM',
    'FB Messenger',
    'Organic WhatsApp',
    'Paid WhatsApp',
    'Lead Form WhatsApp',
    'Booked Appointment Flow',
    'Follow-Up Sequence',
    'FAQ Bot'
  ];

  const content = [
    renderOrganic('igComment', 'Instagram Comment Reply', 'Reply used when someone comments on an Instagram post or ad.'),
    renderOrganic('fbComment', 'Facebook Comment Reply', 'Reply used when someone comments on a Facebook post or ad.'),
    renderOrganic('ttComment', 'TikTok Comment Reply', 'Reply used when someone comments on TikTok content.'),
    renderOrganic('igDM', 'Instagram DM Reply', 'First replies used for inbound Instagram DMs.'),
    renderOrganic('ttDM', 'TikTok DM Reply', 'First replies used for inbound TikTok DMs.'),
    renderOrganic('fbMessenger', 'Facebook Messenger Reply', 'Replies used inside Facebook Messenger.'),
    renderOrganic('organicWhatsapp', 'Organic WhatsApp Reply', 'Auto-replies used for organic WhatsApp enquiries.'),
    renderOrganic('paidWhatsapp', 'Paid WhatsApp Reply', 'Auto-replies used for paid campaign WhatsApp enquiries.'),
    renderOrganic('leadFormWhatsapp', 'Lead Form WhatsApp Reply', 'Replies used when leads come from forms and are redirected into WhatsApp.'),
    renderBookedAppt(),
    renderFollowUp(),
    renderFAQ()
  ];

  return `
  <div class="section-header">
    <div class="section-title">Automation Messaging</div>
    <div class="section-sub">Split your messages by channel so each touchpoint can be tailored properly.</div>
  </div>
  <div class="tabs">${tabs.map((t, i) => `<div class="tab ${autoTab===i?'active':''}" onclick="autoTab=${i};render()">${t}</div>`).join('')}</div>
  ${content[autoTab]}
  <div class="section-footer">
    <button class="btn btn-secondary" onclick="nav(0)">← Calendar Setup</button>
    <button class="btn btn-primary" onclick="showReview()">Review & Finish →</button>
  </div>`;
}

function renderOrganic(key, title, desc) {
  return `
  <div class="card">
    <div class="card-title">${title}</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">${desc}</p>
    ${S.messages[key].map((v, i) => `
      <div class="msg-box">
        <div class="msg-box-header">
          <span class="msg-box-label">Variant ${i+1}</span>
          <span class="char-count" id="cc-msg-${key}-${i}">${v.length} chars</span>
        </div>
        <textarea id="msg-${key}-${i}" data-msg="${key}:${i}" placeholder="Enter ${title.toLowerCase()} variant ${i+1}…">${v}</textarea>
      </div>
    `).join('')}
  </div>`;
}

function renderBookedAppt() {
  const b = S.messages.bookedAppt;
  const fields = [
    {k:'immediate', l:'Immediate Confirmation', p:'Sent immediately after booking is confirmed…'},
    {k:'dayBefore', l:'Day Before Reminder', p:'Sent one day before the appointment…'},
    {k:'reminder30', l:'30-Minute Reminder', p:'Sent 30 minutes before the appointment…'}
  ];

  return `
  <div class="card">
    <div class="card-title">Booked Appointment Flow</div>
    ${fields.map(f => `
      <div class="msg-box">
        <div class="msg-box-header">
          <span class="msg-box-label">${f.l}</span>
          <span class="char-count" id="cc-msg-ba-${f.k}">${(b[f.k] || '').length} chars</span>
        </div>
        <textarea id="msg-ba-${f.k}" data-msg="${f.k}" placeholder="${f.p}">${b[f.k] || ''}</textarea>
      </div>
    `).join('')}
  </div>`;
}

function renderFollowUp() {
  const days = [7,14,30,45,90,'Open Ended'];
  return `
  <div class="card">
    <div class="card-title">Follow-Up Sequence</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Messages sent over time to leads who did not book or stopped replying.</p>
    ${S.messages.followUp.map((v, i) => `
      <div class="msg-box">
        <div class="msg-box-header">
          <span class="msg-box-label">${typeof days[i] === 'number' ? 'Day ' + days[i] : days[i]} Follow-Up</span>
          <span class="char-count" id="cc-msg-fu-${i}">${v.length} chars</span>
        </div>
        <textarea id="msg-fu-${i}" data-msg="followUp:${i}" placeholder="${typeof days[i] === 'number' ? 'Day ' + days[i] : days[i]} follow-up message…">${v}</textarea>
      </div>
    `).join('')}
  </div>`;
}

function renderFAQ() {
  return `
  <div class="card">
    <div class="card-title">FAQ Bot (30 Q&A Pairs)</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Questions and answers your bot can use before redirecting people back to booking.</p>
    ${S.messages.faqBot.map((pair, i) => `
      <div class="faq-item">
        <div class="faq-num">Q${i+1}</div>
        <input type="text" data-faq-q="${i}" value="${pair.q}" placeholder="Question…">
        <textarea data-faq-a="${i}" placeholder="Answer…">${pair.a}</textarea>
      </div>
    `).join('')}
  </div>`;
}

function showReview() {
  const r = document.getElementById('review-screen');
  r.style.display = 'block';
  r.innerHTML = buildReview();
}

function buildReview() {
  const c = S.cal;
  const dayNames = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday', sat:'Saturday', sun:'Sunday' };
  const activeDays = Object.entries(c.days).filter(([, v]) => v).map(([k]) => dayNames[k]).join(', ') || 'None';

  function group(title, rows) {
    const id = 'rg-' + Math.random().toString(36).slice(2);
    return `<div class="review-group">
      <div class="review-group-header" onclick="toggleGroup('${id}')">
        <span class="review-group-title">${title}</span>
        <span class="review-group-toggle" id="${id}-tog">Show ▾</span>
      </div>
      <div class="review-group-body" id="${id}">
        ${rows.map(([k, v]) => `<div class="review-row"><span class="review-key">${k}</span><span class="review-val">${v || '<em style="color:var(--dim)">Not filled</em>'}</span></div>`).join('')}
      </div>
    </div>`;
  }

  const calRows = [
    ['Calendar Name', c.calName],
    ['Description', c.description],
    ['Timezone', c.calTimezone],
    ['Calendar Owner', c.calendarOwner],
    ['Event Title', c.eventTitle],
    ['Meeting Type', c.meetingType],
    ['Meeting Location / Link', c.meetingLocation],
    ['Meeting Interval', c.slotInterval + ' min'],
    ['Meeting Duration', c.slotDuration + ' min'],
    ['Min Scheduling Notice', c.minNotice + ' min'],
    ['Date Range', c.bookingWindow + ' days'],
    ['Pre Buffer Time', c.bufferBefore + ' min'],
    ['Post Buffer Time', c.bufferAfter + ' min'],
    ['Max Bookings Per Day', c.maxPerDay],
    ['Max Booking Per Slot Per Person', c.maxPerSlotPerPerson],
    ['Confirmation Page Message', c.confirmationPageMessage],
    ['Confirmation Mode', c.confirmType],
    ['Active Days', activeDays],
    ['Monday', c.mondayStart + ' – ' + c.mondayEnd],
    ['Tuesday', c.tuesdayStart + ' – ' + c.tuesdayEnd],
    ['Wednesday', c.wednesdayStart + ' – ' + c.wednesdayEnd],
    ['Thursday', c.thursdayStart + ' – ' + c.thursdayEnd],
    ['Friday', c.fridayStart + ' – ' + c.fridayEnd],
    ['Saturday', c.saturdayStart + ' – ' + c.saturdayEnd],
    ['Sunday', c.sundayStart + ' – ' + c.sundayEnd],
    ['Collect Name', c.collectName ? 'Yes' : 'No'],
    ['Collect Email', c.collectEmail ? 'Yes' : 'No'],
    ['Collect Phone', c.collectPhone ? 'Yes' : 'No'],
    ['Collect Reason', c.collectReason ? 'Yes' : 'No'],
    ['Collect Notes', c.collectNotes ? 'Yes' : 'No'],
    ['Allow Reschedule', c.allowReschedule ? 'Yes' : 'No'],
    ['Allow Cancellation', c.allowCancel ? 'Yes' : 'No'],
    ['Require Payment', c.requirePayment ? 'Yes' : 'No'],
    ['Cancellation Policy', c.cancellationPolicy],
    ['Rescheduling Policy', c.reschedulePolicy]
  ];

  const msgRows = [
    ...S.messages.igComment.map((v, i) => ['IG Comment V' + (i+1), v]),
    ...S.messages.fbComment.map((v, i) => ['FB Comment V' + (i+1), v]),
    ...S.messages.ttComment.map((v, i) => ['TikTok Comment V' + (i+1), v]),
    ...S.messages.igDM.map((v, i) => ['IG DM V' + (i+1), v]),
    ...S.messages.ttDM.map((v, i) => ['TikTok DM V' + (i+1), v]),
    ...S.messages.fbMessenger.map((v, i) => ['FB Messenger V' + (i+1), v]),
    ...S.messages.organicWhatsapp.map((v, i) => ['Organic WhatsApp V' + (i+1), v]),
    ...S.messages.paidWhatsapp.map((v, i) => ['Paid WhatsApp V' + (i+1), v]),
    ...S.messages.leadFormWhatsapp.map((v, i) => ['Lead Form WhatsApp V' + (i+1), v]),
    ['Immediate Confirmation', S.messages.bookedAppt.immediate],
    ['Day Before Reminder', S.messages.bookedAppt.dayBefore],
    ['30-Minute Reminder', S.messages.bookedAppt.reminder30],
    ...S.messages.followUp.map((v, i) => ['Follow-Up ' + [7,14,30,45,90,'Open Ended'][i], v])
  ];

  const faqRows = S.messages.faqBot.filter(p => p.q || p.a).map((p, i) => ['Q' + (i+1) + ': ' + p.q, p.a]);

  return `
    <div class="review-header">
      <div class="review-check">✓</div>
      <h1 class="review-title">Onboarding Summary</h1>
      <p class="review-sub">Review all calendar and messaging details before setup starts.</p>
    </div>
    <div class="review-sections">
      ${group('📅 Calendar Setup', calRows)}
      ${group('💬 Automation Messaging', msgRows)}
      ${faqRows.length ? group('🤖 FAQ Bot', faqRows) : ''}
    </div>
    <div class="review-actions">
      <button class="btn btn-ghost" onclick="closeReview()">← Back to Edit</button>
      <button class="btn btn-secondary" onclick="copyJSON(event)">Copy JSON</button>
      <button class="btn btn-primary" onclick="submitAll()">Submit Onboarding ✓</button>
    </div>`;
}

function toggleGroup(id) {
  const body = document.getElementById(id);
  const tog = document.getElementById(id + '-tog');
  const open = body.classList.toggle('open');
  tog.textContent = open ? 'Hide ▴' : 'Show ▾';
}

function closeReview() {
  document.getElementById('review-screen').style.display = 'none';
}

function copyJSON(e) {
  const data = JSON.stringify(S, null, 2);
  navigator.clipboard.writeText(data).then(() => {
    const btn = e.target;
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = original, 1800);
  });
}

function submitAll() {
  alert('Onboarding complete! Your data has been collected.');
}

render();
updateProgress();
</script>
</body>
</html>
